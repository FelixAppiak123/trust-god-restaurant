<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🔐 Admin Dashboard</h1>

    <!-- LOGIN -->
    <div id="login">
        <input type="email" id="username" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="admin-grid">
            <div class="admin-left">
                <div class="panel">
                    <h2>Add / Edit Food</h2>

                    <input type="text" id="foodName" placeholder="Food Name">
                    <input type="number" id="foodPrice" placeholder="Price">
                    <input type="text" id="foodImage" placeholder="Image URL">

                    <button id="addFoodBtn" onclick="addFood()">Add Food</button>
                </div>

                <div class="panel">
                    <h2>Food List</h2>
                    <div id="foodList"></div>
                </div>
            </div>

            <div class="admin-right">
                <div class="panel">
                    <h2>📦 Orders</h2>
                    <div id="ordersList"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

            storageBucket: "trust-god-restaurant.firebasestorage.app",
            messagingSenderId: "1083875067829",
            appId: "1:1083875067829:web:bf9cc4c935b20244e63bfc"

        const db = firebase.firestore();
    </script>

    <!-- login/auth handled in admin.js using compat API -->
    <script src="admin.js"></script>



</body>

</html>
